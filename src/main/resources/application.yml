spring:
  application:
    name: tsaptest-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      # 스키마는 Flyway 마이그레이션(db/migration)이 관리한다.
      # validate = 시작 시 엔티티와 실제 스키마가 일치하는지 검사만 하고 변경은 안 함.
      ddl-auto: validate
    open-in-view: false
  flyway:
    # 이미 스키마가 존재하는 DB(Flyway 도입 이전에 만들어진 현 Railway DB)를 만나면
    # V1을 실행하지 않고 "버전 1까지 적용된 상태"로 기록만 남긴다(baseline).
    # 빈 DB에서는 V1부터 정상 실행되므로 새 환경 구축에도 안전하다.
    baseline-on-migrate: true
    baseline-version: 1
  cache:
    cache-names: portfolio
    caffeine:
      # 사용자가 합의한 "5분 지연 허용" — 스냅샷을 5분간 재사용해 DB 부하 감소
      spec: expireAfterWrite=5m,maximumSize=1000

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    ttl: 12h
  resend:
    # 비어 있으면 실제 발송 대신 로그로만 출력 (dev 폴백)
    api-key: ${RESEND_API_KEY:}
  contact:
    admin-email: ${ADMIN_EMAIL:xonfidentialinfo@gmail.com}
  twofa:
    # false면 2FA를 건너뛰고 로그인 즉시 정식 토큰 발급 (데모/개발용 토글)
    enabled: ${TWOFA_ENABLED:false}
    # Resend 도메인 인증 전에는 가입 계정으로만 발송 가능 —
    # 값을 지정하면 모든 2FA 코드가 이 주소로 간다 (데모용 우회)
    override-email: ${TWOFA_EMAIL_OVERRIDE:}
    # true면 코드를 서버 로그에도 출력 (dev 전용, 운영 금지)
    log-codes: false
  cors:
    # 쉼표로 여러 origin 지정 가능
    allowed-origins: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
  seed-demo-users: false
  admin-account:
    # 둘 다 값이 있으면 기동 시 해당 이메일의 ADMIN 계정이 없을 때 생성한다.
    # ADMIN은 관리자 API로 만들 수 없으므로 이 시더가 유일한 생성 경로.
    email: ${ADMIN_ACCOUNT_EMAIL:}
    password: ${ADMIN_ACCOUNT_PASSWORD:}
